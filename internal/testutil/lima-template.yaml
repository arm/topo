# Lima template for Docker with passwordless SSH access

base:
- docker-template-base.yaml # Lima registers args in order, so we cannot use the remote template and then override the automatic port forwarding in this file- so a local, modified, base is needed.

cpus: 2
memory: 1GiB
disk: 5GiB

mounts: []

provision:
- mode: system
  script: |
    #!/bin/bash
    set -eux -o pipefail
    cat > /etc/ssh/sshd_config.d/01-passwordless-authentication.conf << 'EOF'
    PasswordAuthentication yes
    PermitEmptyPasswords yes
    UsePAM no
    EOF
    systemctl restart sshd || systemctl restart ssh

- mode: system
  script: |
    #!/bin/bash
    set -eux -o pipefail

    TARGET_USER="{{.User}}"

    # Ensure the SSH user is in docker group
    for _ in $(seq 1 120); do
      if getent passwd "$TARGET_USER" >/dev/null 2>&1 && getent group docker >/dev/null 2>&1; then
        usermod -aG docker "$TARGET_USER"
        # Remove password from TARGET_USER)
        passwd -d "$TARGET_USER" || true
        break
      fi
      sleep 1
    done
