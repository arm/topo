name: Release

on:
  workflow_dispatch:
    inputs:
      release-type:
        description: One of 'Major', 'Minor', 'Patch', or 'Pre-release'.
        required: true
        type: choice
        default: Pre-release
        options:
          - Major
          - Minor
          - Patch
          - Pre-release

permissions:
  contents: write
  packages: read
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: false
      - name: Calculate next version
        id: version
        run: |
          latest_release=$(gh release list --limit 100 --json tagName --jq '[.[].tagName | gsub("^v"; "") | select(test("^[0-9]+\\.[0-9]+\\.[0-9]+"))] | sort_by(split("-")[0] | split(".") | map(tonumber)) | reverse | .[0] // empty')
          if [ -z "$latest_release" ]; then
            base="0.0.0"
          else
            base=${latest_release%%-*}
          fi
          IFS='.' read -r major minor patch <<< "$base"
          case "${{ inputs.release-type }}" in
            Major) new="$((major+1)).0.0";;
            Minor) new="$major.$((minor+1)).0";;
            Patch) new="$major.$minor.$((patch+1))";;
            Pre-release) new="$base-$(date +%Y-%m-%d-%H-%M-%S)";;
            *) echo "invalid release type"; exit 1;;
          esac
          echo "version=$new" >> $GITHUB_OUTPUT
          echo "Next version: $new"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set git config
        run: |
          git config --global user.email "topo-release@users.noreply.github.com"
          git config --global user.name "topo-release"

      - name: Create tag
        run: |
          git tag -a "v${{ steps.version.outputs.version }}" -m "Release v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"

      - name: Install GoReleaser
        uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29 # v7.0.0
        with:
          install-only: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29 # v7.0.0
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean --skip=publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: v${{ steps.version.outputs.version }}

      - name: delete the build folders now the archives are there
        run: find dist -maxdepth 1 -type d -name 'topo_*_*_v*' -exec rm -rf {} +

      - name: decompress the archives for signing
        run: |
          for archive in dist/*.tar.gz; do
            base="${archive##*/}"
            dir="dist/${base%.tar.gz}"
            mkdir -p "$dir"
            tar -xzf "$archive" -C "$dir"
          done
          for archive in dist/*.zip; do
            base="${archive##*/}"
            dir="dist/${base%.zip}"
            mkdir -p "$dir"
            unzip -o "$archive" -d "$dir"
          done

      - name: Upload unsigned macOS artifact
        uses: actions/upload-artifact@v7
        with:
          name: topo-v${{ steps.version.outputs.version }}-macos-unsigned
          path: |
            dist/topo_darwin_amd64
            dist/topo_darwin_arm64
          if-no-files-found: error

      - name: Upload unsigned Windows artifacts
        uses: actions/upload-artifact@v7
        with:
          name: topo-v${{ steps.version.outputs.version }}-windows-unsigned
          path: |
            dist/topo_windows_amd64
            dist/topo_windows_arm64
          if-no-files-found: error

      - name: Upload linux artifacts
        uses: actions/upload-artifact@v7
        with:
          name: topo-v${{ steps.version.outputs.version }}-linux
          path: |
            dist/topo_linux_amd64
            dist/topo_linux_arm64
          if-no-files-found: error

  sign-macos:
    needs: build
    uses: Arm-debug/signer/.github/workflows/sign-and-post-macos.yml@return-release-urls
    with:
      run-id: ${{ github.run_id }}
      artifact: topo-v${{ needs.build.outputs.version }}-macos-unsigned
      release-version: ${{ needs.build.outputs.version }}
      repo-name: topo
      org-name: arm
      binary-name: topo
      artifactory-uploadables: topo_darwin_*

  sign-windows:
    needs: build
    uses: Arm-debug/signer/.github/workflows/sign-and-post-windows.yml@return-release-urls
    with:
      run-id: ${{ github.run_id }}
      artifact: topo-v${{ needs.build.outputs.version }}-windows-unsigned
      release-version: ${{ needs.build.outputs.version }}
      repo-name: topo
      org-name: arm
      binary-name: topo.exe
      signing-artifactory-repo: edge-ai-tooling.topo-cli-signing
      artifactory-uploadables: topo_windows_*

  sign-linux:
    needs: build
    uses: Arm-debug/signer/.github/workflows/archive-and-upload-to-artifactory.yml@return-release-urls
    with:
      run-id: ${{ github.run_id }}
      archive-name: topo-v${{ needs.build.outputs.version }}-linux
      release-version: ${{ needs.build.outputs.version }}
      repo-name: topo
      org-name: arm
      artifactory-path: linux
      artifactory-uploadables: topo_linux_*
      archive-format: tar.gz
      executables: "*/topo"

  post-release:
    needs: [sign-macos, sign-windows, sign-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Output artifact URLs
        run: |
          echo "## Artifactory URLs" >> $GITHUB_STEP_SUMMARY
          echo "### macOS" >> $GITHUB_STEP_SUMMARY
          echo "${{ needs.sign-macos.outputs.artifact-urls }}" >> $GITHUB_STEP_SUMMARY
          echo "### Windows" >> $GITHUB_STEP_SUMMARY
          echo "${{ needs.sign-windows.outputs.artifact-urls }}" >> $GITHUB_STEP_SUMMARY
          echo "### Linux" >> $GITHUB_STEP_SUMMARY
          echo "${{ needs.sign-linux.outputs.artifact-urls }}" >> $GITHUB_STEP_SUMMARY
