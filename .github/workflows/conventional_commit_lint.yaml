name: Conventional Commitlint

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]


jobs:
  commitlint:
    runs-on: ubuntu-latest
    name: Conventional Commitlint
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Conventional Commitlint
        uses: opensource-nepal/commitlint@v1
