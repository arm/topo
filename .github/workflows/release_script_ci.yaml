name: Release Script CI

on:
  pull_request:
    paths:
      - "scripts/release/**"
  push:
    branches: [ main ]
    paths:
      - "scripts/release/**"
  workflow_dispatch:

jobs:
  test-scripts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Run script tests
        run: |
          python3 -m unittest \
            scripts/release/check_commit_test.py \
