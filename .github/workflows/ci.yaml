name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  lint:
    runs-on: [ ubuntu-24.04-arm ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true
          cache-dependency-path: |
            **/go.sum

      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
          govulncheck ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: v2.10.1

  build-and-test:
    strategy:
      fail-fast: false
      matrix: 
        os: [ ubuntu-latest, ubuntu-24.04-arm, windows-latest ]
        include:
          - os: windows-latest
            docker_host: tcp://localhost:2375
    runs-on: ${{ matrix.os }}
    steps:
      - name: Install WSL (Windows)
        if: runner.os == 'Windows'
        uses: Vampire/setup-wsl@6a8db447be7ed35f2f499c02c6e60ff77ef11278 # v6
        with:
          distribution: Ubuntu-24.04
          additional-packages: docker.io

      - name: Start Docker with TCP (Windows - WSL)
        if: runner.os == 'Windows'
        shell: wsl-bash {0}
        run: |
          mkdir -p /etc/systemd/system/docker.service.d
          cat > /etc/systemd/system/docker.service.d/override.conf << 'EOF'
          [Service]
          ExecStart=
          ExecStart=/usr/bin/dockerd -H unix:///var/run/docker.sock -H tcp://0.0.0.0:2375
          EOF

          systemctl stop docker.socket docker.service
          systemctl daemon-reload
          systemctl start docker
          timeout 30 sh -c 'until docker -H tcp://127.0.0.1:2375 info >/dev/null 2>&1; do sleep 1; done'

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true
          cache-dependency-path: |
            **/go.sum

      - name: Build
        run: |
          go build -v ./cmd/topo

      - name: Run tests with coverage
        env:
          DOCKER_HOST: ${{ matrix.docker_host }}
        run: |
          go test ./... -p 1 -v -covermode=atomic -coverprofile=coverage.out
