<svg viewBox="0 0 1000 500" width="1000" height="500" fill="none"
  xmlns="http://www.w3.org/2000/svg" font-family="Aeonik, Arial, sans-serif" role="img" aria-labelledby="title description">
  <title id="title">Topo deployment and development loop</title>
  <desc id="description">
    A Topo Project and Topo run on the host. Topo deploys Linux containers and optional remote processor firmware to an Arm target over SSH. You review the deployment, tweak the project, and redeploy.
  </desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7C7C7C"/>
    </marker>
  </defs>

  <rect x="20" y="45" width="560" height="245" rx="28" stroke="#7C7C7C" stroke-opacity="0.55" stroke-width="2"/>
  <text x="48" y="82" fill="#7C7C7C" font-size="22" font-weight="600">Host</text>
  <text x="48" y="106" fill="#7C7C7C" font-size="14">Development machine</text>

  <rect x="60" y="135" width="210" height="105" rx="12" fill="#D1BAFC"/>
  <text x="165" y="174" text-anchor="middle" fill="#29243E" font-size="21" font-weight="600">Topo Project</text>
  <text x="165" y="204" text-anchor="middle" fill="#29243E" fill-opacity="0.8" font-size="13">Compose services</text>
  <text x="165" y="222" text-anchor="middle" fill="#29243E" fill-opacity="0.8" font-size="13">x-topo parameters</text>

  <path d="M278 188 H340" stroke="#7C7C7C" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="350" y="135" width="190" height="105" rx="12" fill="#7233F7"/>
  <text x="445" y="178" text-anchor="middle" fill="#FFFFFF" font-size="24" font-weight="600">Topo</text>
  <text x="445" y="207" text-anchor="middle" fill="#FFFFFF" fill-opacity="0.9" font-size="13">Configure · build · deploy</text>

  <path d="M548 188 H680" stroke="#7C7C7C" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="630" y="150" text-anchor="middle" fill="#7C7C7C" font-size="13" font-weight="600">Deploy</text>
  <text x="630" y="166" text-anchor="middle" fill="#7C7C7C" font-size="13" font-weight="600">over SSH</text>

  <rect x="680" y="45" width="300" height="245" rx="28" stroke="#7C7C7C" stroke-opacity="0.55" stroke-width="2"/>
  <text x="708" y="82" fill="#7C7C7C" font-size="22" font-weight="600">Target</text>
  <text x="708" y="106" fill="#7C7C7C" font-size="14">Arm device</text>

  <rect x="720" y="135" width="220" height="50" rx="10" fill="#61D5B0"/>
  <text x="830" y="166" text-anchor="middle" fill="#183B42" font-size="16" font-weight="600">Linux containers</text>

  <rect x="720" y="200" width="220" height="65" rx="10" fill="#61D5B0"/>
  <text x="830" y="227" text-anchor="middle" fill="#183B42" font-size="16" font-weight="600">Remoteproc Runtime</text>
  <text x="830" y="249" text-anchor="middle" fill="#183B42" fill-opacity="0.8" font-size="12">Firmware on remote processors</text>

  <path d="M830 290 V340" stroke="#7C7C7C" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="700" y="350" width="250" height="75" rx="12" fill="#D1BAFC"/>
  <text x="825" y="380" text-anchor="middle" fill="#29243E" font-size="18" font-weight="600">Review on target</text>
  <text x="825" y="403" text-anchor="middle" fill="#29243E" fill-opacity="0.8" font-size="13">Check the running services</text>

  <path d="M692 388 H630" stroke="#7C7C7C" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="340" y="350" width="280" height="75" rx="12" fill="#D1BAFC"/>
  <text x="480" y="380" text-anchor="middle" fill="#29243E" font-size="18" font-weight="600">Tweak the project</text>
  <text x="480" y="403" text-anchor="middle" fill="#29243E" fill-opacity="0.8" font-size="13">Edit code or run topo configure</text>

  <path d="M340 388 H250 C195 388 165 350 165 300 V248" stroke="#7C7C7C" stroke-width="3" marker-end="url(#arrow)"/>
</svg>
